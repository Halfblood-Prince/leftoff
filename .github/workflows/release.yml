name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Annotated tag to release, for example v1.0.0"
        required: true

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --tags --force
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "$tag" ]; then
            echo "release tag is empty" >&2
            exit 1
          fi
          if [ "$(git cat-file -t "$tag")" != "tag" ]; then
            echo "Release tags must be annotated. Create one with: git tag -a $tag -m 'leftoff $tag'" >&2
            exit 1
          fi
          git checkout "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true

      - name: Check plugin versions
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: sh ./plugins/leftoff/scripts/check-version.sh

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          dist_dir="${GITHUB_WORKSPACE}/dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"

          copy_plugin_files() {
            local target="$1"
            mkdir -p "$target"
            cp -R plugins/leftoff/. "$target"/
            chmod +x "$target/bin/leftoff" "$target/scripts/setup-binary.sh"
            chmod +x "$target/skills/leftoff/scripts/leftoff" "$target/skills/leftoff/scripts/setup-binary.sh"
          }

          skill_dir="$dist_dir/leftoff.skill"
          copy_plugin_files "$skill_dir"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for platform in "${platforms[@]}"; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            name="leftoff_${TAG}_${goos}_${goarch}"
            package_dir="$dist_dir/${name}"
            copy_plugin_files "$package_dir"
            mkdir -p "$package_dir/bin"
            binary="leftoff"
            if [ "$goos" = "windows" ]; then
              binary="leftoff.exe"
            fi
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X github.com/Halfblood-Prince/leftoff/internal/leftoff.LeftoffVersion=${VERSION}" \
              -o "$package_dir/bin/$binary" ./cmd/leftoff
            mkdir -p "$skill_dir/bin/${goos}_${goarch}"
            cp "$package_dir/bin/$binary" "$skill_dir/bin/${goos}_${goarch}/$binary"
            mkdir -p "$skill_dir/skills/leftoff/scripts/${goos}_${goarch}"
            cp "$package_dir/bin/$binary" "$skill_dir/skills/leftoff/scripts/${goos}_${goarch}/$binary"
            (cd "$dist_dir" && zip -qr "${name}.zip" "$name")
          done

          (cd "$skill_dir" && zip -qr "$dist_dir/leftoff.skill.zip" .)
          (cd "$dist_dir" && sha256sum *.zip > SHA256SUMS)

      - name: Verify skill archive layout
        shell: bash
        run: |
          set -euo pipefail
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E '(^|[[:space:]])skills/leftoff/SKILL.md$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E '(^|[[:space:]])skills/leftoff/scripts/leftoff$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E '(^|[[:space:]])skills/leftoff/scripts/setup-binary.sh$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E '(^|[[:space:]]).claude-plugin/plugin.json$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E '(^|[[:space:]]).codex-plugin/plugin.json$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E '(^|[[:space:]])bin/leftoff$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E 'bin/darwin_arm64/leftoff$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E 'bin/darwin_amd64/leftoff$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E 'skills/leftoff/scripts/darwin_arm64/leftoff$'
          unzip -l "$GITHUB_WORKSPACE/dist/leftoff.skill.zip" | grep -E 'skills/leftoff/scripts/darwin_amd64/leftoff$'

      - name: Smoke test Linux release archive
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          unzip -q "$GITHUB_WORKSPACE/dist/leftoff_${TAG}_linux_amd64.zip" -d "$smoke_dir"
          bundle="$smoke_dir/leftoff_${TAG}_linux_amd64"
          store="$(mktemp -d)"
          "$bundle/bin/leftoff" version
          "$bundle/bin/leftoff" init --store "$store"
          "$bundle/bin/leftoff" capture --store "$store" "task: Smoke release archive"
          "$bundle/bin/leftoff" now --store "$store" --minutes 30

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            dist/*.zip
            dist/SHA256SUMS

      - name: Write release notes
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          cat > "$GITHUB_WORKSPACE/dist/release-notes.md" <<EOF
          ## Install

          GitHub Agent Skill install:

          \`\`\`sh
          gh skill preview ${GITHUB_REPOSITORY} leftoff
          gh skill install ${GITHUB_REPOSITORY} leftoff@${TAG} --agent codex --scope user
          \`\`\`

          Direct release download:

          \`\`\`sh
          gh release download ${TAG} --repo ${GITHUB_REPOSITORY} --pattern 'leftoff.skill.zip'
          \`\`\`

          ## Artifacts

          - \`leftoff.skill.zip\`: plugin-shaped bundle with manifests, \`skills/leftoff/SKILL.md\`, self-contained skill scripts, launchers, and prebuilt binaries.
          - \`leftoff_${TAG}_darwin_amd64.zip\`: macOS Intel bundle.
          - \`leftoff_${TAG}_darwin_arm64.zip\`: macOS Apple Silicon bundle.
          - Linux and Windows bundles for amd64 and arm64.
          - \`SHA256SUMS\`: checksums for every zip artifact.

          The core workflow remains local-first. Remote GitHub metadata is still opt-in through \`leftoff github --refresh\`.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$GITHUB_WORKSPACE"/dist/*.zip "$GITHUB_WORKSPACE"/dist/SHA256SUMS --clobber
            gh release edit "$TAG" \
              --title "leftoff $TAG" \
              --notes-file "$GITHUB_WORKSPACE/dist/release-notes.md"
          else
            gh release create "$TAG" "$GITHUB_WORKSPACE"/dist/*.zip "$GITHUB_WORKSPACE"/dist/SHA256SUMS \
              --title "leftoff $TAG" \
              --notes-file "$GITHUB_WORKSPACE/dist/release-notes.md" \
              --verify-tag
          fi
