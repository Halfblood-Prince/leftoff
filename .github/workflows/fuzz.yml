name: Fuzz

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Go fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz targets
        shell: bash
        run: |
          for target in FuzzParseCapture FuzzParseMarkdownRecords FuzzRedactRemoteURL; do
            go test ./internal/leftoff -run=^$ -fuzz="^${target}$" -fuzztime=10s -parallel=1 -timeout=3m
          done
