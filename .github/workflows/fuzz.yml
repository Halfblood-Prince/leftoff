name: Fuzz

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Go fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz targets
        shell: bash
        run: |
          for target in FuzzParseCapture FuzzParseMarkdownRecords FuzzRedactRemoteURL; do
            go test ./internal/leftoff -run=^$ -fuzz="^${target}$" -fuzztime=10s -parallel=1 -timeout=3m
          done
